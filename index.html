<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolis del Ring | ¡Sabor de Campeonato!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Nunito', sans-serif; scroll-behavior: smooth; }
        .font-luck { font-family: 'Bangers', cursive; letter-spacing: 1px; }
        .bg-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .product-card:hover { transform: scale(1.02); transition: all 0.3s ease; }
        .hero-bg { 
            position: relative; 
            background-image: url('https://i.postimg.cc/5t9myq4m/7d882dbf-1798-4a80-b9ec-d2b54d5d6191.jpg'); 
            background-size: cover; 
            background-position: center; 
        }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 1; }

        /* Clases de Administración */
        .admin-controls { display: none !important; }
        body.is-promotor .admin-controls { display: flex !important; }
        
        #auth-modal { display: none; z-index: 9999; }
        #auth-modal.active { display: flex; }

        .secret-trigger { cursor: pointer; transition: all 0.3s ease; user-select: none; -webkit-tap-highlight-color: transparent; }
        .secret-trigger:active { transform: scale(0.95); }
    </style>
    
    <script>
        window.openAuthModal = function(e) {
            if(e) e.stopPropagation();
            const modal = document.getElementById('auth-modal');
            if (modal) {
                modal.classList.add('active');
                setTimeout(() => {
                    const input = document.getElementById('admin-pass');
                    if(input) input.focus();
                }, 100);
            }
        };

        window.closeAuthModal = function() {
            const modal = document.getElementById('auth-modal');
            if (modal) {
                modal.classList.remove('active');
                document.getElementById('admin-pass').value = '';
            }
        };

        window.verifyPromotor = function() {
            const pass = document.getElementById('admin-pass').value;
            // CLAVE POR DEFECTO: 1.2.3
            if(pass === '1.2.3') {
                window.dispatchEvent(new CustomEvent('authSuccess'));
                window.closeAuthModal();
            } else {
                window.showToast("❌ CLAVE INCORRECTA");
                document.getElementById('admin-pass').value = '';
            }
        };

        window.showToast = function(msg) {
            const t = document.createElement('div');
            t.className = "fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full font-black text-[10px] z-[10000] shadow-2xl animate-bounce";
            t.innerText = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        };
    </script>
</head>
<body class="bg-slate-100 text-slate-800 transition-colors duration-300">

    <nav class="sticky top-0 z-50 bg-glass border-b border-slate-200 px-4 py-3 flex justify-between items-center shadow-sm">
        <div onclick="window.openAuthModal(event)" class="secret-trigger flex items-center gap-2 group">
            <div class="bg-red-600 p-2 rounded-lg text-white shadow-lg rotate-3 group-hover:rotate-0 transition-transform">
                <i class="fas fa-mask fa-lg"></i>
            </div>
            <h1 class="text-2xl font-luck text-slate-900 tracking-wider uppercase">BOLIS <span class="text-red-600">DEL RING</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="promotor-badge" class="hidden bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase animate-pulse">
                Modo Promotor
            </span>
            <button onclick="window.toggleCart()" class="relative p-2 text-slate-600 hover:text-red-500 transition-colors">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <header class="relative hero-bg py-20 px-6 text-white text-center">
        <div class="hero-overlay"></div>
        <div class="relative z-10 max-w-4xl mx-auto">
            <h2 class="text-5xl md:text-7xl font-luck mb-4 drop-shadow-lg uppercase">¡Sabor que noquea el calor! 🥊</h2>
            <p class="text-lg font-bold mb-8 opacity-90">Los bolis más potentes de la arena, directo a tu casa.</p>
            <a href="#catalogo" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-black uppercase transition-all shadow-xl">Ver Cartelera</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        
        <section id="admin-form-section" class="hidden mb-12 bg-white rounded-3xl p-8 shadow-2xl border-4 border-yellow-400">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-3xl font-luck text-slate-900 uppercase">Añadir Nuevo Luchador</h3>
                <button onclick="window.logoutPromotor()" class="text-red-600 font-black text-xs uppercase underline">Cerrar Sesión</button>
            </div>
            <form id="add-product-form" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="p-name" placeholder="Nombre del Sabor" required class="px-4 py-2 rounded-lg border-2 border-slate-200 outline-none">
                <input type="number" id="p-price" placeholder="Precio ($)" required class="px-4 py-2 rounded-lg border-2 border-slate-200 outline-none">
                <input type="number" id="p-stock" placeholder="Stock" required class="px-4 py-2 rounded-lg border-2 border-slate-200 outline-none">
                <select id="p-category" class="px-4 py-2 rounded-lg border-2 border-slate-200 outline-none">
                    <option value="Rudo">Rudo (Agua)</option>
                    <option value="Técnico">Técnico (Cremoso)</option>
                </select>
                <input type="text" id="p-image" placeholder="URL Imagen" required class="md:col-span-3 px-4 py-2 rounded-lg border-2 border-slate-200 outline-none">
                <button type="submit" class="bg-slate-900 text-white font-black py-2 rounded-lg uppercase hover:bg-red-600">Registrar</button>
            </form>
        </section>

        <section id="catalogo" class="mb-20">
            <h3 class="text-4xl font-luck text-slate-800 uppercase mb-8 border-b-4 border-red-600 inline-block">Cartelera Oficial</h3>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <p id="loading-msg" class="col-span-full text-center py-10 font-bold text-slate-400 animate-pulse">CONECTANDO CON LA ARENA...</p>
            </div>
        </section>

        <section id="domicilio" class="hidden max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border-2 border-slate-900 mb-20">
            <h3 class="text-3xl font-luck text-center mb-6 uppercase">Confirmar Envío</h3>
            <form id="order-form" class="space-y-4">
                <input type="text" id="order-name" placeholder="Tu Nombre" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 outline-none">
                <input type="text" id="order-address" placeholder="Dirección" required class="w-full px-4 py-3 rounded-xl border-2 border-slate-100 outline-none">
                <div class="bg-slate-900 text-white p-4 rounded-xl flex justify-between items-center">
                    <span class="font-luck text-xl">TOTAL:</span>
                    <span id="order-total" class="text-2xl font-black text-yellow-400">$0</span>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white font-black py-4 rounded-xl text-lg uppercase flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp text-xl"></i> WhatsApp
                </button>
            </form>
        </section>
    </main>

    <div id="auth-modal" class="fixed inset-0 bg-slate-900/90 items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full shadow-2xl border-4 border-red-600 text-center">
            <div class="w-20 h-20 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i class="fas fa-lock fa-2x"></i>
            </div>
            <h4 class="text-2xl font-luck uppercase mb-2">Acceso Promotor</h4>
            <input type="password" id="admin-pass" placeholder="Clave" class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 outline-none text-center text-2xl tracking-[0.5em] mb-6">
            <div class="flex gap-3">
                <button onclick="window.closeAuthModal()" class="flex-1 py-3 font-black text-slate-400">SALIR</button>
                <button onclick="window.verifyPromotor()" class="flex-1 bg-slate-900 text-white py-3 rounded-xl font-black">ENTRAR</button>
            </div>
        </div>
    </div>

    <div id="cart-drawer" class="fixed inset-0 z-[60] bg-black/60 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute right-0 top-0 h-full w-full max-w-sm bg-white translate-x-full transition-transform duration-300 flex flex-col">
            <div class="p-6 border-b flex justify-between items-center">
                <h4 class="text-2xl font-luck uppercase">Tu Selección</h4>
                <button onclick="window.toggleCart()"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-4"></div>
            <div class="p-6 bg-slate-50 border-t">
                <div class="flex justify-between text-xl font-luck mb-4"><span>Total:</span><span id="cart-total" class="text-red-600">$0</span></div>
                <button onclick="window.showOrderForm()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-black uppercase">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        /* IMPORTANTE: Para GitHub, pega tus credenciales aquí */
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "PEGA_TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "ID",
            appId: "APP_ID"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'bolis-ring-v1';

        let products = [];
        let cart = [];
        let isPromotor = false;

        // Escuchar éxito de autenticación local para UI
        window.addEventListener('authSuccess', () => {
            isPromotor = true;
            document.body.classList.add('is-promotor');
            document.getElementById('promotor-badge').classList.remove('hidden');
            document.getElementById('admin-form-section').classList.remove('hidden');
            renderProducts();
            window.showToast("🔓 MODO PROMOTOR ACTIVADO");
            document.getElementById('admin-form-section').scrollIntoView({behavior: 'smooth'});
        });

        window.logoutPromotor = () => {
            isPromotor = false;
            document.body.classList.remove('is-promotor');
            document.getElementById('promotor-badge').classList.add('hidden');
            document.getElementById('admin-form-section').classList.add('hidden');
            renderProducts();
            window.showToast("SESIÓN CERRADA");
        };

        // Lógica de Firestore
        window.addNewProduct = async (e) => {
            e.preventDefault();
            const id = "boli_" + Date.now();
            const newP = {
                name: document.getElementById('p-name').value,
                price: parseInt(document.getElementById('p-price').value),
                stock: parseInt(document.getElementById('p-stock').value),
                category: document.getElementById('p-category').value,
                image: document.getElementById('p-image').value
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id), newP);
                document.getElementById('add-product-form').reset();
                window.showToast("SABOR REGISTRADO ✅");
            } catch (err) { 
                console.error("Error al añadir:", err);
                window.showToast("ERROR DE PERMISOS FIRESTORE");
            }
        };

        window.updateStock = async (id, delta) => {
            const p = products.find(x => x.id === id);
            const newStock = Math.max(0, p.stock + delta);
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id), { stock: newStock });
            } catch (err) { console.error("Error de stock:", err); }
        };

        window.deleteProduct = async (id) => {
            if (confirm("¿Retirar sabor de la cartelera?")) {
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', id));
                    window.showToast("SABOR RETIRADO");
                } catch (err) { console.error("Error al borrar:", err); }
            }
        };

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            if(!grid) return;
            
            if(products.length === 0) {
                grid.innerHTML = '<p class="col-span-full text-center py-10 font-bold text-slate-400">CARGANDO ARENA...</p>';
                return;
            }

            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-3xl overflow-hidden shadow-xl flex flex-col relative border border-slate-100">
                    <button onclick="window.deleteProduct('${p.id}')" class="admin-controls absolute top-2 right-2 bg-red-600 text-white w-8 h-8 rounded-full z-20 flex items-center justify-center hover:scale-110">
                        <i class="fas fa-trash-alt text-xs"></i>
                    </button>
                    <div class="h-48 overflow-hidden relative group">
                        <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x300/e2e8f0/64748b?text=${p.name}'">
                        <div class="admin-controls absolute inset-0 bg-black/40 items-center justify-center gap-4 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="window.updateStock('${p.id}', -1)" class="w-10 h-10 bg-white rounded-full font-black hover:bg-red-500 hover:text-white transition-colors">-</button>
                            <span class="text-white font-black">Stock: ${p.stock}</span>
                            <button onclick="window.updateStock('${p.id}', 1)" class="w-10 h-10 bg-white rounded-full font-black hover:bg-green-500 hover:text-white transition-colors">+</button>
                        </div>
                        <span class="absolute bottom-2 left-2 bg-slate-900 text-white text-[10px] px-2 py-1 rounded font-black uppercase">${p.category}</span>
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-xl font-luck text-slate-800 uppercase leading-tight">${p.name}</h4>
                            <span class="text-[10px] font-black ${p.stock > 0 ? 'text-green-600 bg-green-50' : 'text-red-500 bg-red-50'} px-2 py-1 rounded">${p.stock > 0 ? `Quedan ${p.stock}` : 'AGOTADO'}</span>
                        </div>
                        <p class="text-2xl font-black text-red-600 mb-4">$${p.price.toLocaleString()}</p>
                        <button onclick="window.addToCart('${p.id}')" ${p.stock <= 0 ? 'disabled' : ''} class="w-full ${p.stock > 0 ? 'bg-slate-900 hover:bg-red-600' : 'bg-slate-300'} text-white font-black py-3 rounded-xl uppercase text-xs transition-colors mt-auto">
                            ${p.stock > 0 ? 'Añadir al Equipo' : 'Fuera de Combate'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const p = products.find(x => x.id === id);
            const item = cart.find(x => x.id === id);
            if(item) {
                if(item.quantity < p.stock) item.quantity++;
                else return window.showToast("MÁXIMO STOCK ALCANZADO");
            } else cart.push({...p, quantity: 1});
            updateCartUI();
            window.showToast("¡En la bolsa! 🥊");
        };

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + (i.price * i.quantity), 0);
            const count = cart.reduce((s, i) => s + i.quantity, 0);
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-count').classList.toggle('hidden', count === 0);
            document.getElementById('cart-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('order-total').innerText = `$${total.toLocaleString()}`;
            document.getElementById('cart-items').innerHTML = cart.map(i => `
                <div class="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                    <div class="flex-1">
                        <h5 class="text-xs font-black uppercase">${i.name}</h5>
                        <p class="text-[10px] text-red-600 font-bold">$${i.price.toLocaleString()} x ${i.quantity}</p>
                    </div>
                    <button onclick="window.removeFromCart('${i.id}')" class="text-slate-300 hover:text-red-600 p-2"><i class="fas fa-trash-alt"></i></button>
                </div>
            `).join('');
        }

        window.removeFromCart = (id) => { cart = cart.filter(x => x.id !== id); updateCartUI(); };
        
        window.toggleCart = () => {
            const d = document.getElementById('cart-drawer');
            const isOpen = !d.classList.contains('pointer-events-none');
            d.classList.toggle('opacity-0', isOpen);
            d.classList.toggle('pointer-events-none', isOpen);
            d.firstElementChild.classList.toggle('translate-x-full', isOpen);
        };

        window.showOrderForm = () => {
            if(cart.length === 0) return window.showToast("Bolsa vacía");
            window.toggleCart();
            const form = document.getElementById('domicilio');
            form.classList.remove('hidden');
            form.scrollIntoView({behavior: 'smooth'});
        };

        window.sendOrder = (e) => {
            e.preventDefault();
            const name = document.getElementById('order-name').value;
            const addr = document.getElementById('order-address').value;
            let msg = `🥊 *NUEVO PEDIDO - BOLIS DEL RING* 🥊\n\n`;
            msg += `👤 *Luchador:* ${name}\n📍 *Arena:* ${addr}\n\n`;
            cart.forEach(i => msg += `• ${i.quantity}x ${i.name} ($${(i.price*i.quantity).toLocaleString()})\n`);
            msg += `\n💰 *TOTAL: ${document.getElementById('order-total').innerText}*`;
            window.open(`https://wa.me/573145865641?text=${encodeURIComponent(msg)}`);
        };

        document.getElementById('add-product-form').addEventListener('submit', window.addNewProduct);
        document.getElementById('order-form').addEventListener('submit', window.sendOrder);

        signInAnonymously(auth).then(() => {
            console.log("Autenticación Exitosa ✅");
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'inventory');
            
            onSnapshot(colRef, (snap) => {
                products = [];
                snap.forEach(d => products.push({...d.data(), id: d.id}));
                renderProducts();
            }, (error) => {
                console.error("ERROR DE PERMISOS FIRESTORE:", error);
                document.getElementById('product-grid').innerHTML = `
                    <div class="col-span-full p-8 bg-red-50 text-red-600 rounded-3xl text-center border-2 border-red-200">
                        <i class="fas fa-exclamation-triangle fa-3x mb-4"></i>
                        <p class="font-black text-xl mb-2 uppercase">Error de Permisos</p>
                        <p class="text-sm font-bold opacity-80 mb-4">Firestore está bloqueando el acceso. Debes actualizar las Reglas de Seguridad en tu Consola de Firebase.</p>
                        <div class="bg-white p-4 rounded-xl text-left text-[10px] font-mono overflow-x-auto border">
                            // Pega esto en Firebase Console > Rules:<br>
                            allow read: if true;<br>
                            allow write: if request.auth != null;
                        </div>
                    </div>
                `;
            });
        }).catch(err => {
            console.error("Error Auth:", err);
            window.showToast("ERROR DE CONEXIÓN");
        });
    </script>
</body>
</html>
