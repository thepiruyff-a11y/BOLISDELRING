<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolis del Ring | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; scroll-behavior: smooth; }
        .font-luck { font-family: 'Bangers', cursive; letter-spacing: 1px; }
        .bg-glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .hero-bg { 
            position: relative; 
            background-image: url('https://i.postimg.cc/5t9myq4m/7d882dbf-1798-4a80-b9ec-d2b54d5d6191.jpg'); 
            background-size: cover; 
            background-position: center; 
        }
        .hero-overlay { position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); z-index: 1; }
        .product-card:hover { transform: scale(1.02); transition: all 0.3s ease; }
        
        #admin-controls-section { display: none; }
        .admin-active #admin-controls-section { display: block; }
        .admin-badge { display: none; }
        .admin-active .admin-badge { display: flex; }
        
        /* Modal de Seguridad */
        #password-modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">

    <nav class="sticky top-0 z-50 bg-glass border-b border-slate-200 px-4 py-3 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-2 rounded-lg text-white shadow-lg rotate-3">
                <i class="fas fa-mask fa-lg"></i>
            </div>
            <h1 class="text-2xl font-luck text-slate-900 tracking-wider">BOLIS <span class="text-red-600">DEL RING</span></h1>
        </div>
        
        <div class="flex items-center gap-4">
            <!-- Botón de Llave para Admin -->
            <button onclick="requestAccess('toggle')" class="p-2 text-slate-400 hover:text-red-600 transition-colors" title="Acceso Promotor">
                <i class="fas fa-key text-xl"></i>
            </button>
            <button onclick="toggleCart()" class="relative p-2 text-slate-600 hover:text-red-500 transition-colors">
                <i class="fas fa-shopping-basket text-xl"></i>
                <span id="cart-count" class="absolute -top-1 -right-1 bg-blue-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full hidden">0</span>
            </button>
        </div>
    </nav>

    <header class="relative hero-bg py-20 px-6 text-center text-white">
        <div class="hero-overlay"></div>
        <div class="relative z-10 max-w-4xl mx-auto">
            <h2 class="text-5xl md:text-6xl font-luck mb-4 drop-shadow-lg">¡EL SABOR QUE NOQUEA AL CALOR! 🥊</h2>
            <p class="text-xl font-bold mb-8 opacity-90">Ventas al detal y al por mayor en toda la arena.</p>
            <a href="#catalogo" class="bg-red-600 hover:bg-yellow-400 hover:text-slate-900 text-white px-8 py-4 rounded-xl font-black transition-all shadow-lg inline-block">VER CARTELERA</a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-6">
        <section id="catalogo" class="mb-16">
            <div class="flex justify-between items-center mb-8 border-b-4 border-red-600 pb-2">
                <h3 class="text-3xl font-luck">SABORES EN COMBATE</h3>
                <div id="admin-indicator" class="hidden bg-yellow-400 text-slate-900 px-3 py-1 rounded-full text-xs font-black animate-pulse">MODO PROMOTOR ACTIVO</div>
            </div>
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Se llena con JS -->
            </div>
        </section>

        <section id="admin-controls-section" class="bg-white rounded-3xl p-8 shadow-2xl border-4 border-slate-900 mb-20">
            <h3 class="text-3xl font-luck mb-6 text-center">NUEVO LUCHADOR (AGREGAR PRODUCTO)</h3>
            <form id="add-product-form" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-4">
                    <input type="text" id="new-name" placeholder="Nombre (Ej: Mango 'El Terrible')" required class="w-full p-3 rounded-xl border-2 border-slate-100 outline-none focus:border-red-500">
                    <input type="number" id="new-price" placeholder="Precio ($)" value="2000" required class="w-full p-3 rounded-xl border-2 border-slate-100 outline-none focus:border-red-500">
                </div>
                <div class="space-y-4">
                    <input type="number" id="new-stock" placeholder="Stock Inicial" value="10" required class="w-full p-3 rounded-xl border-2 border-slate-100 outline-none focus:border-red-500">
                    <input type="url" id="new-image" placeholder="URL de la imagen" required class="w-full p-3 rounded-xl border-2 border-slate-100 outline-none focus:border-red-500">
                </div>
                <button type="button" onclick="requestAccess('add')" class="md:col-span-2 bg-slate-900 text-white py-4 rounded-xl font-black hover:bg-red-600 transition-colors uppercase tracking-widest">
                    ¡SUBIR AL CUADRILÁTERO!
                </button>
            </form>
        </section>

        <section id="domicilio" class="hidden bg-white rounded-3xl p-8 shadow-xl max-w-xl mx-auto mb-20 border-2 border-green-500">
            <h3 class="text-2xl font-luck text-center mb-6">DATOS DE ENTREGA</h3>
            <form id="order-form" class="space-y-4">
                <input type="text" id="cust-name" placeholder="Tu Nombre" required class="w-full p-3 rounded-xl border-2 border-slate-100">
                <input type="tel" id="cust-phone" placeholder="WhatsApp" required class="w-full p-3 rounded-xl border-2 border-slate-100">
                <input type="text" id="cust-address" placeholder="Dirección de la Arena" required class="w-full p-3 rounded-xl border-2 border-slate-100">
                <div class="bg-slate-900 text-white p-4 rounded-xl flex justify-between font-luck text-xl">
                    <span>TOTAL:</span>
                    <span id="form-total" class="text-yellow-400">$0</span>
                </div>
                <button type="submit" class="w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg hover:bg-green-700">ENVIAR PEDIDO POR WHATSAPP</button>
            </form>
        </section>
    </main>

    <div id="password-modal">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl border-4 border-red-600 max-w-xs w-full text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-lock fa-2x"></i>
            </div>
            <h4 class="font-luck text-2xl mb-2">ZONA RESTRINGIDA</h4>
            <p class="text-xs font-bold text-slate-500 mb-6 uppercase tracking-wider">Ingresa la clave de Promotor</p>
            <input type="password" id="admin-password-input" class="w-full p-4 text-center text-2xl font-black border-2 border-slate-100 rounded-2xl mb-4 focus:border-red-500 outline-none tracking-[1em]" placeholder="***">
            <div class="flex gap-2">
                <button onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-600 py-3 rounded-xl font-bold">CANCELAR</button>
                <button onclick="verifyPassword()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold">ENTRAR</button>
            </div>
        </div>
    </div>

    <!-- Carrito -->
    <div id="cart-drawer" class="fixed inset-0 z-[60] bg-black/70 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="absolute right-0 top-0 h-full w-full max-w-sm bg-white translate-x-full transition-transform duration-300 flex flex-col border-l-4 border-red-600">
            <div class="p-6 border-b flex justify-between items-center bg-slate-50">
                <h4 class="text-2xl font-luck uppercase">TU EQUIPAJE</h4>
                <button onclick="toggleCart()" class="text-slate-400 hover:text-red-600"><i class="fas fa-times text-2xl"></i></button>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto p-4 space-y-3"></div>
            <div class="p-6 bg-slate-900 text-white">
                <div class="flex justify-between text-2xl font-luck mb-4"><span>TOTAL:</span><span id="cart-total-display" class="text-yellow-400">$0</span></div>
                <button onclick="goToCheckout()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase">IR AL PAGO</button>
            </div>
        </div>
    </div>

    <script>
        const CLAVE_CORRECTA = "1.2.3";
        let isAdminMode = false;
        let pendingAction = null; // Guardará qué queríamos hacer antes de pedir la clave

        const initialProducts = [
            { id: 1, name: 'Maracumango "El Rayo"', price: 2000, stock: 15, image: 'https://i.ytimg.com/vi/9qDS1wJY9ow/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLD-rwbzRq8DMtMdIeZngaMR-zgrCg', cat: 'Rudo' },
            { id: 2, name: 'Fresa "La Guerrera"', price: 2000, stock: 12, image: 'https://i.postimg.cc/RF9nsv8w/07931b69-3faa-40ea-ac84-4052aa03e81a.jpg', cat: 'Rudo' },
            { id: 3, name: 'Coco "El Enmascarado"', price: 2000, stock: 20, image: 'https://i.postimg.cc/CKxNvHqf/Chat-GPT-Image-7-may-2026-00-02-50.png', cat: 'Técnico' }
        ];

        let products = JSON.parse(localStorage.getItem('bolis_db')) || initialProducts;
        let cart = [];

        function renderProducts() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = products.map(p => `
                <div class="product-card bg-white rounded-3xl overflow-hidden shadow-xl border-2 border-slate-100 flex flex-col relative">
                    <div class="h-48 overflow-hidden bg-slate-100">
                        <img src="${p.image}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x400/ef4444/white?text=Boli'">
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <h4 class="text-xl font-luck text-slate-800 mb-2">${p.name}</h4>
                        <div class="text-2xl font-black text-red-600 mb-4">$${p.price.toLocaleString()}</div>
                        <div class="text-xs font-black uppercase mb-4 ${p.stock > 0 ? 'text-green-600' : 'text-red-500'}">
                            ${p.stock > 0 ? `DISPONIBLES: ${p.stock}` : 'AGOTADO'}
                        </div>

                        <!-- Controles de Stock (Solo visibles si isAdminMode es true) -->
                        <div class="admin-badge ${isAdminMode ? 'flex' : 'hidden'} items-center justify-between bg-yellow-100 p-2 rounded-lg mb-4 border border-yellow-300">
                            <span class="text-[10px] font-black">STOCK:</span>
                            <div class="flex gap-2">
                                <button onclick="requestAccess('stock', {id:${p.id}, delta:-1})" class="w-8 h-8 bg-white rounded-lg font-bold border-2 border-yellow-400 hover:bg-yellow-400">-</button>
                                <span class="font-bold">${p.stock}</span>
                                <button onclick="requestAccess('stock', {id:${p.id}, delta:1})" class="w-8 h-8 bg-white rounded-lg font-bold border-2 border-yellow-400 hover:bg-yellow-400">+</button>
                            </div>
                        </div>

                        <button onclick="addToCart(${p.id})" ${p.stock <= 0 ? 'disabled' : ''} class="w-full mt-auto ${p.stock > 0 ? 'bg-slate-900 hover:bg-red-600' : 'bg-slate-300'} text-white font-black py-3 rounded-xl transition-all uppercase text-sm">
                            ${p.stock > 0 ? 'AGREGAR AL EQUIPO' : 'FUERA DE SERVICIO'}
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function requestAccess(type, params = null) {
            // Cada vez que se llama, preparamos la acción
            pendingAction = { type, params };
            document.getElementById('password-modal').style.display = 'flex';
            document.getElementById('admin-password-input').value = '';
            document.getElementById('admin-password-input').focus();
        }

        function closeModal() {
            document.getElementById('password-modal').style.display = 'none';
            pendingAction = null;
        }

        function verifyPassword() {
            const input = document.getElementById('admin-password-input').value;
            
            if (input === CLAVE_CORRECTA) {
                executeAction();
                closeModal();
                showNotice("¡ACCESO CONCEDIDO, PROMOTOR!", true);
            } else {
                showNotice("CLAVE INCORRECTA. INTENTO FALLIDO.");
            }
        }

        function executeAction() {
            if (!pendingAction) return;

            const { type, params } = pendingAction;

            if (type === 'toggle') {
                isAdminMode = !isAdminMode;
                document.body.classList.toggle('admin-active', isAdminMode);
                document.getElementById('admin-indicator').classList.toggle('hidden', !isAdminMode);
                renderProducts();
            } 
            else if (type === 'stock') {
                const p = products.find(prod => prod.id === params.id);
                if (p) {
                    p.stock = Math.max(0, p.stock + params.delta);
                    saveData();
                    renderProducts();
                }
            } 
            else if (type === 'add') {
                const name = document.getElementById('new-name').value;
                const price = parseInt(document.getElementById('new-price').value);
                const stock = parseInt(document.getElementById('new-stock').value);
                const img = document.getElementById('new-image').value;

                if (name && img) {
                    products.push({ id: Date.now(), name, price, stock, image: img });
                    saveData();
                    renderProducts();
                    document.getElementById('add-product-form').reset();
                }
            }
        }

        function saveData() {
            localStorage.setItem('bolis_db', JSON.stringify(products));
        }

        function addToCart(id) {
            const p = products.find(prod => prod.id === id);
            if (p && p.stock > 0) {
                const inCart = cart.find(item => item.id === id);
                if (inCart) {
                    if (inCart.qty < p.stock) inCart.qty++;
                    else { showNotice("No hay más stock disponible"); return; }
                } else {
                    cart.push({ ...p, qty: 1 });
                }
                updateUI();
                showNotice(`¡${p.name} añadido!`);
            }
        }

        function updateUI() {
            const count = cart.reduce((s, i) => s + i.qty, 0);
            const badge = document.getElementById('cart-count');
            badge.innerText = count;
            badge.classList.toggle('hidden', count === 0);

            let total = 0;
            const itemsCont = document.getElementById('cart-items');
            if (cart.length === 0) {
                itemsCont.innerHTML = '<p class="text-center text-slate-400 mt-10 uppercase font-black">Vacío</p>';
            } else {
                itemsCont.innerHTML = cart.map(item => {
                    total += item.price * item.qty;
                    return `
                        <div class="flex items-center gap-3 bg-slate-50 p-3 rounded-xl border">
                            <img src="${item.image}" class="w-10 h-10 object-cover rounded-lg">
                            <div class="flex-1">
                                <p class="text-[10px] font-black uppercase leading-none">${item.name}</p>
                                <p class="text-red-600 font-bold">$${(item.price * item.qty).toLocaleString()}</p>
                            </div>
                            <span class="font-black text-xs">x${item.qty}</span>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('cart-total-display').innerText = `$${total.toLocaleString()}`;
            document.getElementById('form-total').innerText = `$${total.toLocaleString()}`;
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            const inner = drawer.firstElementChild;
            if (drawer.classList.contains('pointer-events-none')) {
                drawer.classList.remove('opacity-0', 'pointer-events-none');
                inner.classList.remove('translate-x-full');
            } else {
                drawer.classList.add('opacity-0', 'pointer-events-none');
                inner.classList.add('translate-x-full');
            }
        }

        function goToCheckout() {
            if (cart.length === 0) return;
            toggleCart();
            document.getElementById('domicilio').classList.remove('hidden');
            document.getElementById('domicilio').scrollIntoView({ behavior: 'smooth' });
        }

        function showNotice(msg, isSuccess = false) {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-xl text-white font-black shadow-2xl transition-all duration-300 uppercase text-xs tracking-widest ${isSuccess ? 'bg-green-600' : 'bg-slate-900 border-2 border-red-600'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 2000);
        }

        // Listener para cerrar con ESC o entrar con Enter en el modal
        window.addEventListener('keydown', (e) => {
            if (document.getElementById('password-modal').style.display === 'flex') {
                if (e.key === 'Enter') verifyPassword();
                if (e.key === 'Escape') closeModal();
            }
        });

        window.onload = renderProducts;
    </script>
</body>
</html>
